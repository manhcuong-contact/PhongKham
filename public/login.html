<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MediFlow Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full border border-[#e5eeff]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#004ac6] mb-2">MediFlow</h1>
            <p class="text-gray-500">Đăng nhập vào bảng điều khiển</p>
        </div>

        <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
            <span class="block sm:inline" id="errorText">Sai email hoặc mật khẩu</span>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="admin@mediflow.vn">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#004ac6] text-white font-semibold py-3 rounded-lg hover:bg-blue-800 transition-colors shadow-md flex justify-center items-center">
                <span id="btnText">Đăng Nhập</span>
                <svg id="spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            Chưa có tài khoản? <a href="/register.html" class="text-[#004ac6] font-semibold hover:underline">Đăng ký ngay</a>
        </p>
    </div>

    <!-- Nhúng api.js -->
    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            // Reset UI
            errorDiv.classList.add('hidden');
            btnText.textContent = 'Đang xử lý...';
            spinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                // Gọi API từ api.js
                const res = await api.login(email, password);
                
                // Lưu token
                setTokens(res.data.accessToken, res.data.refreshToken);
                localStorage.setItem('user', JSON.stringify(res.data.user));

                // Điều hướng dựa trên role
                if (res.data.user.role === 'admin' || res.data.user.role === 'doctor') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/index.html'; // Trang chủ cho bệnh nhân (nếu có)
                }

            } catch (error) {
                errorText.textContent = error.message || 'Đăng nhập thất bại';
                errorDiv.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Đăng Nhập';
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Nếu đã có token và là admin, redirect luôn
        if (getAccessToken()) {
            const userStr = localStorage.getItem('user');
            if(userStr) {
                const u = JSON.parse(userStr);
                if(u.role === 'admin') window.location.href = '/admin.html';
            }
        }
    </script>
</body>
</html>
