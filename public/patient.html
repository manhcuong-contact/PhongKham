<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bệnh nhân - MediFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-[#e5eeff]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer" onclick="window.location.href='/index.html'">
                    <span class="text-2xl font-bold text-[#004ac6]">MediFlow</span>
                    <span class="ml-2 text-sm text-gray-500 font-medium">| Dành cho Bệnh nhân</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="navUserName" class="text-sm font-medium text-gray-700"></span>
                    <button onclick="clearTokens(); window.location.href='/login.html';" class="text-sm text-red-600 hover:text-red-800 font-medium">Đăng xuất</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Lịch khám của tôi</h1>
                <p class="text-gray-500 mt-1">Theo dõi và quản lý các lịch hẹn khám bệnh</p>
            </div>
            <a href="/book-clinic.html" class="bg-[#004ac6] text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-800 transition shadow flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Đặt Lịch Khám Mới
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-[#e5eeff] overflow-hidden">
            <div id="appointmentsContainer" class="divide-y divide-gray-100">
                <!-- Data will be loaded here -->
                <div class="p-8 text-center text-gray-500">Đang tải lịch khám...</div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = getAccessToken();
            const userStr = localStorage.getItem('user');
            if (!token || !userStr) {
                window.location.href = '/login.html';
                return;
            }

            const user = JSON.parse(userStr);
            if (user.role !== 'patient') {
                window.location.href = '/admin.html';
                return;
            }

            document.getElementById('navUserName').textContent = user.email;
            await loadMyAppointments();
        });

        async function loadMyAppointments() {
            const container = document.getElementById('appointmentsContainer');
            try {
                const res = await fetchAPI('/appointments/my');
                const apps = res.data;

                if (!apps || apps.length === 0) {
                    container.innerHTML = `
                        <div class="p-12 text-center">
                            <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <h3 class="text-lg font-medium text-gray-900 mb-1">Chưa có lịch khám</h3>
                            <p class="text-gray-500">Bạn chưa đặt bất kỳ lịch khám nào.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = apps.map(app => {
                    const date = new Date(app.appointmentDate).toLocaleDateString('vi-VN');
                    let statusHtml = '';
                    if (app.status === 'pending') statusHtml = '<span class="px-2.5 py-1 text-xs font-medium bg-yellow-100 text-yellow-800 rounded-full">Chờ xác nhận</span>';
                    else if (app.status === 'confirmed') statusHtml = '<span class="px-2.5 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded-full">Đã xác nhận</span>';
                    else if (app.status === 'completed') statusHtml = '<span class="px-2.5 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">Đã hoàn thành</span>';
                    else statusHtml = '<span class="px-2.5 py-1 text-xs font-medium bg-red-100 text-red-800 rounded-full">Đã hủy</span>';

                    return `
                        <div class="p-6 hover:bg-gray-50 transition flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex items-start gap-4">
                                <div class="bg-blue-50 text-[#004ac6] w-12 h-12 rounded-lg flex flex-col items-center justify-center flex-shrink-0">
                                    <span class="text-xs font-semibold">${date.split('/')[0]}</span>
                                    <span class="text-[10px] uppercase">Thg ${date.split('/')[1]}</span>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-900 text-lg">${app.clinic?.name || 'Phòng khám chưa rõ'}</h4>
                                    <div class="text-sm text-gray-500 mt-1 flex items-center flex-wrap gap-x-4 gap-y-1">
                                        <span class="flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${app.startTime} - ${app.endTime}</span>
                                        <span class="flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> BS. ${app.doctor?.fullName || '---'}</span>
                                        ${app.specialty ? `<span class="flex items-center text-blue-600"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg> ${app.specialty.name}</span>` : ''}
                                    </div>
                                    <p class="text-sm text-gray-600 mt-2"><span class="font-medium">Lý do:</span> ${app.reason || 'Không có'}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                ${statusHtml}
                                ${app.status === 'pending' || app.status === 'confirmed' ? `<button onclick="cancelAppointment(${app.id})" class="text-xs text-red-600 hover:text-red-800 font-medium underline">Hủy lịch</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `<div class="p-8 text-center text-red-500">Lỗi khi tải dữ liệu: ${error.message}</div>`;
            }
        }

        async function cancelAppointment(id) {
            if (!confirm('Bạn có chắc chắn muốn hủy lịch hẹn này?')) return;
            try {
                await fetchAPI(`/appointments/${id}/cancel`, {
                    method: 'PATCH',
                    body: JSON.stringify({ cancelReason: 'Bệnh nhân tự hủy qua web' })
                });
                alert('Đã hủy lịch thành công');
                loadMyAppointments();
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
    </script>
</body>
</html>
