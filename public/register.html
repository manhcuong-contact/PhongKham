<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - MediFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-8">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full border border-[#e5eeff]">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-[#004ac6] mb-2">MediFlow</h1>
            <p class="text-gray-500">Tạo tài khoản Bệnh nhân mới</p>
        </div>

        <div id="alertMessage" class="hidden px-4 py-3 rounded relative mb-4 text-sm" role="alert">
            <span class="block sm:inline" id="alertText"></span>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Họ và Tên</label>
                <input type="text" id="fullName" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="Nguyễn Văn A">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                <input type="tel" id="phone" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="0901234567">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="email@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#004ac6] focus:border-transparent outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#004ac6] text-white font-semibold py-3 rounded-lg hover:bg-blue-800 transition-colors shadow-md flex justify-center items-center mt-6">
                <span id="btnText">Đăng Ký</span>
                <svg id="spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            Đã có tài khoản? <a href="/login.html" class="text-[#004ac6] font-semibold hover:underline">Đăng nhập</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            // Reset UI
            alertDiv.className = 'hidden px-4 py-3 rounded relative mb-4 text-sm';
            btnText.textContent = 'Đang xử lý...';
            spinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, fullName, phone })
                });

                const data = await response.json();

                if (response.ok) {
                    alertDiv.classList.remove('hidden');
                    alertDiv.classList.add('bg-green-100', 'border', 'border-green-400', 'text-green-700');
                    alertText.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Có lỗi xảy ra');
                }

            } catch (error) {
                alertDiv.classList.remove('hidden');
                alertDiv.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
                alertText.textContent = error.message || 'Đăng ký thất bại';
                
                btnText.textContent = 'Đăng Ký';
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
